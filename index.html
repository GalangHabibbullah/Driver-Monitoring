<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Monitoring System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #00adb5; margin-bottom: 25px; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .btn:hover { background-color: #007a80; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .card h3 { margin: 0 0 10px 0; color: #aaaaaa; font-size: 14px; }
        .value { font-size: 28px; font-weight: bold; color: #eeeeee; }
        .status-box {
            padding: 20px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            margin-top: 20px;
            background-color: #2d2d2d;
            border: 2px solid #444;
        }
        .normal { color: #2ecc71; border-color: #2ecc71; }
        .bahaya { color: #e74c3c; border-color: #e74c3c; background-color: #3a1a1a; }
        .control-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            text-align: left;
        }
        .control-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #00adb5; }
        input[type="range"] {
            width: 100%;
            background: #444;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }
        .slider-val { font-size: 18px; font-weight: bold; color: #fff; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 MONITORING PENGEMUDI</h1>
    
    <button class="btn" id="btnKonek" onclick="hubungkanSerial()">🔌 Hubungkan ke Arduino</button>

    <div class="grid">
        <div class="card">
            <h3>PITCH (Kemiringan Depan/Belakang)</h3>
            <div class="value" id="valPitch">0.0°</div>
        </div>
        <div class="card">
            <h3>ROLL (Kemiringan Kiri/Kanan)</h3>
            <div class="value" id="valRoll">0.0°</div>
        </div>
        <div class="card">
            <h3>BASELINE BPM</h3>
            <div class="value" id="valBaseline" style="color: #ffb703;">Belum Set</div>
        </div>
        <div class="card">
            <h3>SIMULASI BPM</h3>
            <div class="value" id="valBPM" style="color: #00adb5;">0</div>
        </div>
    </div>

    <div class="status-box normal" id="boxStatus">SISTEM SIAP</div>

    <div class="control-section">
        <h3>🛠️ PANEL SIMULASI DETAK JANTUNG</h3>
        
        <div class="control-group">
            <button class="btn" id="btnBaseline" onclick="setBaseline()" style="background-color: #ffb703; color: #121212;" disabled>Lock Baseline BPM Saat Ini</button>
        </div>

        <div class="control-group">
            <label>Geser Nilai Heart Rate (BPM): <span id="lblBPM" class="slider-val">80</span></label>
            <input type="range" id="sliderBPM" min="40" max="140" value="80" oninput="updateBPM(this.value)" disabled>
        </div>
    </div>
</div>

<script>
    let port;
    let reader;
    let writer;
    let inputBuffer = "";
    let currentBPM = 80;

    async function hubungkanSerial() {
        if ("serial" in navigator) {
            try {
                // Meminta izin user memilih Port COM Arduino
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                document.getElementById("btnKonek").innerText = "✅ Terhubung via USB";
                document.getElementById("btnKonek").style.backgroundColor = "#2ecc71";
                document.getElementById("sliderBPM").disabled = false;
                document.getElementById("btnBaseline").disabled = false;

                // Siapkan jalur kirim data (Writer)
                const textEncoder = new TextEncoderStream();
                textEncoder.stream.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();

                // Jalankan fungsi pengirim data detak jantung awal
                updateBPM(currentBPM);

                // Jalankan loop pembacaan data masuk (Reader) dari Arduino
                bacaDataMasuk();

            } catch (err) {
                alert("Gagal membuka port serial: " + err);
            }
        } else {
            alert("Browser kamu tidak mendukung WebSerial API. Gunakan Google Chrome atau Microsoft Edge!");
        }
    }

    // Fungsi Kirim Nilai BPM Real-time (Format: H[nilai]\n)
    async function updateBPM(nilai) {
        currentBPM = nilai;
        document.getElementById("lblBPM").innerText = nilai;
        document.getElementById("valBPM").innerText = nilai;
        
        if (writer) {
            await writer.write("H" + nilai + "\n");
        }
    }

    // Fungsi Mengunci dan Kirim Nilai Baseline (Format: B[nilai]\n)
    async function setBaseline() {
        document.getElementById("valBaseline").innerText = currentBPM + " BPM";
        if (writer) {
            await writer.write("B" + currentBPM + "\n");
        }
    }

    // Fungsi Membaca Data JSON yang Dikirim Arduino via USB
    async function bacaDataMasuk() {
        const textDecoder = new TextDecoderStream();
        port.readable.pipeTo(textDecoder.writable);
        reader = textDecoder.readable.getReader();

        while (true) {
            const { value, done } = await reader.read();
            if (done) {
                reader.releaseLock();
                break;
            }
            if (value) {
                inputBuffer += value;
                // Pecah data berdasarkan baris baru (\n)
                let baris = inputBuffer.split("\n");
                inputBuffer = baris.pop(); // Simpan sisa string yang belum lengkap

                for (let dataBaris of baris) {
                    dataBaris = dataBaris.trim();
                    if (dataBaris.startsWith("{") && dataBaris.endsWith("}")) {
                        try {
                            // Parse teks string menjadi object JSON Javascript
                            let json = JSON.parse(dataBaris);
                            
                            // Update tampilan ke HTML
                            document.getElementById("valPitch").innerText = json.pitch + "°";
                            document.getElementById("valRoll").innerText = json.roll + "°";
                            
                            let statusBox = document.getElementById("boxStatus");
                            statusBox.innerText = json.status;
                            
                            if (json.status === "BAHAYA") {
                                statusBox.className = "status-box bahaya";
                            } else {
                                statusBox.className = "status-box normal";
                            }
                        } catch (e) {
                            // Abaikan jika data JSON terpotong di tengah jalan
                        }
                    }
                }
            }
        }
    }
</script>
</body>
</html>
