<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Monitor (Serial Mode)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--bdr:#30363d;
  --cyan:#00e5ff;--green:#3fb950;--red:#f85149;--yellow:#e3b341;
  --txt:#e6edf3;--muted:#8b949e;
}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{padding:18px 20px 0;border-bottom:1px solid var(--bdr);display:flex;justify-content:between;align-items:center;}
header h1{font-size:17px;font-weight:600;letter-spacing:.5px;color:var(--cyan)}
header p{font-size:11px;color:var(--muted);margin:2px 0 14px}
main{padding:16px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

#banner{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border-radius:10px;background:#0f2419;border:1px solid var(--green);transition:.3s}
#banner.danger{background:#2d1111;border-color:var(--red)}
#dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;transition:.3s}
#banner.danger #dot{background:var(--red)}
#st-label{font-size:13px;font-weight:600}
#st-sub{font-size:11px;color:var(--muted);margin-top:1px}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 10px;text-align:center;border-top:3px solid var(--cyan)}
.card.c-red{border-top-color:var(--red)}
.card.c-yel{border-top-color:var(--yellow)}
.card-lbl{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.card-val{font-size:26px;font-weight:700;line-height:1}
.card-unit{font-size:10px;color:var(--muted);margin-top:3px}
.card.c-red .card-val{color:var(--red)}
.card.c-yel .card-val{font-size:18px;color:var(--yellow)}

/* Penambahan Style Kontrol GUI Simulasi */
.simulator-section {background:var(--surf); border:1px solid var(--bdr); padding:15px; border-radius:10px;}
.simulator-section h3 {font-size:13px; color:var(--cyan); margin-bottom:10px; text-transform:uppercase;}
.control-group {display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
.control-group label {font-size:11px; color:var(--muted);}
.slider-container {display:flex; align-items:center; gap:10px;}
input[type=range] {flex:1; accent-color:var(--cyan);}

.actions{display:flex;gap:10px}
.btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;
  text-align:center;cursor:pointer;border:1px solid var(--bdr);text-decoration:none;transition:.2s}
.btn:hover{opacity:.8}
.btn-connect{background:var(--cyan);color:#0d1117;border-color:var(--cyan)}
.btn-baseline{background:transparent;color:var(--yellow);border-color:var(--yellow)}
#last-up{font-size:10px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<header>
  <div>
    <h1>DRIVER MONITOR (SIMULATOR)</h1>
    <p>Monitoring kantuk via Web Serial API</p>
  </div>
</header>
<main>
  <button id="btn-conn" class="btn btn-connect" onclick="connectSerial()">HUBUNGKAN KE ARDUINO</button>

  <div id="banner">
    <div id="dot"></div>
    <div>
      <div id="st-label" style="color:var(--green)">DISCONNECTED</div>
      <div id="st-sub">Silakan klik tombol hubungkan di atas</div>
    </div>
  </div>

  <div class="cards">
    <div class="card c-red">
      <div class="card-lbl">Heart Rate</div>
      <div class="card-val" id="bpm">--</div>
      <div class="card-unit">BPM</div>
      <div id="base-val" style="font-size:9px; color:var(--muted); margin-top:5px;">Base: --</div>
    </div>
    <div class="card c-yel">
      <div class="card-lbl">Pitch</div>
      <div class="card-val" id="pitch">--</div>
      <div class="card-unit">derajat</div>
    </div>
    <div class="card c-yel">
      <div class="card-lbl">Roll</div>
      <div class="card-val" id="roll">--</div>
      <div class="card-unit">derajat</div>
    </div>
  </div>

  <div class="simulator-section">
    <h3>Panel Simulasi Detak Jantung</h3>
    <div class="control-group">
      <label>Geser untuk Ubah Detak Jantung Saat Ini:</label>
      <div class="slider-container">
        <input type="range" id="bpm-slider" min="40" max="140" value="80" disabled oninput="updateSliderVal(this.value)">
        <span id="slider-txt" style="font-weight:bold; min-width:30px;">80</span> BPM
      </div>
    </div>
    <div class="actions">
      <button id="btn-base" class="btn btn-baseline" disabled onclick="setBaseline()">JADIKAN SEBAGAI BASELINE</button>
    </div>
  </div>

  <div id="last-up">Menunggu koneksi serial...</div>
</main>

<script>
let port;
let writer;
let baselineBPM = 0;
let currentSimBPM = 80;

// 1. Fungsi Koneksi ke Arduino via Web Serial API
async function connectSerial() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    
    writer = port.writable.getWriter();
    
    // Aktifkan kontrol GUI setelah sukses terhubung
    document.getElementById('bpm-slider').disabled = false;
    document.getElementById('btn-base').disabled = false;
    document.getElementById('btn-conn').textContent = "TERHUBUNG";
    document.getElementById('btn-conn').style.background = "var(--green)";
    document.getElementById('btn-conn').style.borderColor = "var(--green)";
    
    document.getElementById('st-label').textContent = "NORMAL";
    document.getElementById('st-label').style.color = "var(--green)";
    document.getElementById('st-sub').textContent = "Sistem berjalan baik";

    // Kirim data awal
    sendSimulatedBPM();
    // Mulai membaca data dari Arduino
    readSerial();
  } catch (error) {
    console.error("Gagal membuka port serial:", error);
    alert("Gagal terhubung ke perangkat. Pastikan port COM benar dan browser mendukung Web Serial API.");
  }
}

// 2. Fungsi Update nilai Slider GUI & Kirim ke Arduino
function updateSliderVal(val) {
  currentSimBPM = parseInt(val);
  document.getElementById('slider-txt').textContent = val;
  document.getElementById('bpm').textContent = val;
  sendSimulatedBPM();
}

// 3. Fungsi Menentukan Nilai Baseline BPM
function setBaseline() {
  baselineBPM = currentSimBPM;
  document.getElementById('base-val').textContent = "Base: " + baselineBPM + " BPM";
  sendSimulatedBPM();
}

// 4. Fungsi Kirim Data ke Arduino via Serial ("BPM,BASELINE\n")
async function sendSimulatedBPM() {
  if (writer) {
    const dataToSend = `${currentSimBPM},${baselineBPM}\n`;
    await writer.write(new TextEncoder().encode(dataToSend));
  }
}

// 5. Fungsi Membaca Data Masuk (Pitch, Roll, Status) dari Arduino
async function readSerial() {
  const decoder = new TextDecoderStream();
  const inputClosed = port.readable.pipeTo(decoder.writable);
  const reader = decoder.readable.getReader();

  try {
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) {
        buffer += value;
        // Memastikan pembacaan berbasis baris demi baris JSON (\n)
        let lines = buffer.split('\n');
        buffer = lines.pop(); // simpan sisa data yang belum lengkap

        for(let line of lines) {
          if(line.trim() === "") continue;
          try {
            const data = JSON.parse(line.trim());
            
            // Update Tampilan Angka Sensor
            document.getElementById('pitch').textContent = data.pitch;
            document.getElementById('roll').textContent = data.roll;
            
            // Update Tampilan Banner Status Bahaya/Normal
            const bn = document.getElementById('banner');
            const sl = document.getElementById('st-label');
            const ss = document.getElementById('st-sub');
            
            if(data.status === 'BAHAYA'){
              bn.className = 'danger';
              sl.style.color = 'var(--red)';
              sl.textContent = 'BAHAYA — MENGANTUK';
              ss.textContent = 'Buzzer Menyala! Segera Berhenti!';
            } else {
              bn.className = '';
              sl.style.color = 'var(--green)';
              sl.textContent = 'NORMAL';
              ss.textContent = 'Pengemudi dalam kondisi baik';
            }
            
            document.getElementById('last-up').textContent = 
              'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');
              
          } catch(e) {
            // Abaikan jika ada potongan data JSON yang korup di awal stream
          }
        }
      }
    }
  } catch (error) {
    console.error("Error saat membaca Serial:", error);
    document.getElementById('last-up').textContent = 'Koneksi Terputus';
  } finally {
    reader.releaseLock();
  }
}
</script>
</body>
</html>
