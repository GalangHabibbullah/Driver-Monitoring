<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Monitor Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #050b14;
    --glass-bg: rgba(16, 24, 43, 0.6);
    --glass-border: rgba(0, 229, 255, 0.2);
    --cyan: #00e5ff;
    --green: #00fa9a;
    --red: #ff3366;
    --yellow: #ffcc00;
    --text-main: #e0fbfc;
    --text-muted: #8ea8c3;
  }

  body {
    background: radial-gradient(circle at 50% 0%, #112240 0%, var(--bg-dark) 80%);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .dashboard-container {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* --- Glass Panel Effect --- */
  .glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  /* --- Header & Institution Branding --- */
  header { text-align: center; margin-bottom: 5px; }
  
  .inst-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 15px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(0, 229, 255, 0.15);
  }
  .inst-logo {
    width: 45px;
    height: auto;
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
  }
  .inst-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--text-main);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: left;
    line-height: 1.2;
  }
  .inst-text span {
    display: block;
    font-size: 10px;
    color: var(--cyan);
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    color: var(--cyan);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  header p { font-size: 14px; color: var(--text-muted); margin-top: 5px; letter-spacing: 1px; }

  /* --- Connect Button --- */
  .btn-connect {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(0, 229, 255, 0));
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
  }
  .btn-connect:hover {
    background: rgba(0, 229, 255, 0.2);
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
  }

  /* --- Status Banner --- */
  #banner {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 16px 20px;
    border-radius: 12px;
    background: rgba(0, 250, 154, 0.05);
    border: 1px solid rgba(0, 250, 154, 0.3);
    transition: 0.4s ease;
  }
  #dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    flex-shrink: 0;
    transition: 0.4s;
  }
  #st-label { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  #st-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* DANGER STATE */
  #banner.danger {
    background: rgba(255, 51, 102, 0.1);
    border-color: var(--red);
    box-shadow: inset 0 0 20px rgba(255, 51, 102, 0.2);
    animation: pulseDanger 1.5s infinite;
  }
  #banner.danger #dot { background: var(--red); box-shadow: 0 0 15px var(--red); }
  @keyframes pulseDanger {
    0% { box-shadow: inset 0 0 20px rgba(255, 51, 102, 0.2); }
    50% { box-shadow: inset 0 0 40px rgba(255, 51, 102, 0.5), 0 0 20px rgba(255, 51, 102, 0.3); }
    100% { box-shadow: inset 0 0 20px rgba(255, 51, 102, 0.2); }
  }

  /* --- Data Cards --- */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .card {
    background: rgba(16, 24, 43, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 20px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* Card glowing top borders */
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--cyan);
  }
  .card.c-red::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
  .card.c-yel::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

  .card-lbl { font-size: 12px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .card-val { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .card-unit { font-size: 12px; color: rgba(255,255,255,0.4); }
  
  .card.c-red .card-val { color: var(--red); text-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }
  .card.c-yel .card-val { font-size: 24px; color: var(--yellow); text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
  #base-val { font-size: 11px; color: var(--cyan); margin-top: 8px; font-weight: 600; letter-spacing: 0.5px; }

  /* --- Simulator Section --- */
  .simulator-section h3 {
    font-size: 14px; color: var(--cyan); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); padding-bottom: 8px;
  }
  .control-group label { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; display: block; }
  .slider-container { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
  
  /* Styling Slider agar futuristik */
  input[type=range] { flex: 1; -webkit-appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 10px var(--cyan); margin-top: -7px; cursor: pointer; transition: 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  
  #slider-txt { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--cyan); min-width: 35px; display: inline-block; text-align: right; }

  /* Baseline Button */
  .btn-baseline {
    width: 100%; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; letter-spacing: 1px;
    background: transparent; color: var(--yellow); border: 1px solid var(--yellow); cursor: pointer; transition: 0.3s;
  }
  .btn-baseline:hover:not([disabled]) { background: rgba(255, 204, 0, 0.1); box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
  .btn-baseline:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--text-muted); color: var(--text-muted); }

  #last-up { font-size: 11px; color: var(--text-muted); text-align: center; letter-spacing: 1px; margin-top: -5px; }

  /* Responsiveness */
  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
    .card { padding: 15px; }
    .card::before { width: 3px; height: 100%; top: 0; left: 0; right: auto; }
  }
</style>
</head>
<body>

<div class="dashboard-container">
  <header>
    <div class="inst-header">
      <img src="https://upload.wikimedia.org/wikipedia/id/4/44/Logo_PENS.png" alt="Logo PENS" class="inst-logo">
      <div class="inst-text">
        Politeknik Elektronika<br>Negeri Surabaya
        <span>Innovation for a Better Future</span>
      </div>
    </div>

    <h1>DRIVER MONITORING SIMULATION</h1>
    <p>Galang Habibbullah</p>
  </header>

  <button id="btn-conn" class="glass-panel btn-connect">INISIALISASI KONEKSI ARDUINO</button>

  <div id="banner" class="glass-panel">
    <div id="dot"></div>
    <div>
      <div id="st-label" style="color:var(--text-main)">OFFLINE</div>
      <div id="st-sub">Menunggu sinkronisasi port serial...</div>
    </div>
  </div>

  <div class="cards">
    <div class="card c-red">
      <div class="card-lbl">Heart Rate</div>
      <div class="card-val" id="bpm">--</div>
      <div class="card-unit">BPM</div>
      <div id="base-val">BASE: --</div>
    </div>
    <div class="card c-yel">
      <div class="card-lbl">Pitch Angle</div>
      <div class="card-val" id="pitch">--</div>
      <div class="card-unit">DEG</div>
    </div>
    <div class="card c-yel">
      <div class="card-lbl">Roll Angle</div>
      <div class="card-val" id="roll">--</div>
      <div class="card-unit">DEG</div>
    </div>
  </div>

  <div class="simulator-section glass-panel">
    <h3>Panel Override Jantung</h3>
    <div class="control-group">
      <label>Kalibrasi Input BPM Manual:</label>
      <div class="slider-container">
        <input type="range" id="bpm-slider" min="40" max="140" value="80" disabled oninput="updateSliderVal(this.value)">
        <span id="slider-txt">80</span> <span style="font-size: 12px; color: var(--text-muted);">BPM</span>
      </div>
    </div>
    <button id="btn-base" class="btn-baseline" disabled onclick="setBaseline()">TETAPKAN SEBAGAI BASELINE</button>
  </div>

  <div id="last-up">Sistem Siaga.</div>
</div>

<script>
// =========================================================================
// KODE JAVASCRIPT TETAP SAMA AGAR KONEKSI SERIAL ARDUINO TETAP AMAN
// =========================================================================

let port;
let writer;
let baselineBPM = 0;
let currentSimBPM = 80;

document.getElementById('btn-conn').addEventListener('click', connectSerial);

async function connectSerial() {
  if (!("serial" in navigator)) {
    alert("Browser Anda tidak mendukung Web Serial API. Gunakan Google Chrome atau Microsoft Edge di PC/Laptop.");
    return;
  }

  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    
    writer = port.writable.getWriter();
    
    document.getElementById('bpm-slider').disabled = false;
    document.getElementById('btn-base').disabled = false;
    
    document.getElementById('btn-conn').textContent = "TERHUBUNG / SINKRONISASI AKTIF";
    document.getElementById('btn-conn').style.color = "var(--green)";
    document.getElementById('btn-conn').style.borderColor = "var(--green)";
    document.getElementById('btn-conn').style.textShadow = "0 0 8px rgba(0, 250, 154, 0.5)";
    
    document.getElementById('st-label').textContent = "NORMAL";
    document.getElementById('st-label').style.color = "var(--green)";
    document.getElementById('st-sub').textContent = "Sistem berjalan baik";

    sendSimulatedBPM();
    readSerial();
  } catch (error) {
    console.error("Gagal membuka port serial:", error);
    alert("Koneksi dibatalkan atau gagal terhubung ke perangkat.");
  }
}

function updateSliderVal(val) {
  currentSimBPM = parseInt(val);
  document.getElementById('slider-txt').textContent = val;
  document.getElementById('bpm').textContent = val;
  sendSimulatedBPM();
}

function setBaseline() {
  baselineBPM = currentSimBPM;
  document.getElementById('base-val').textContent = "BASE: " + baselineBPM + " BPM";
  sendSimulatedBPM();
}

async function sendSimulatedBPM() {
  if (writer) {
    const dataToSend = `${currentSimBPM},${baselineBPM}\n`;
    await writer.write(new TextEncoder().encode(dataToSend));
  }
}

async function readSerial() {
  const decoder = new TextDecoderStream();
  const inputClosed = port.readable.pipeTo(decoder.writable);
  const reader = decoder.readable.getReader();

  try {
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) {
        buffer += value;
        let lines = buffer.split('\n');
        buffer = lines.pop();

        for(let line of lines) {
          if(line.trim() === "") continue;
          try {
            const data = JSON.parse(line.trim());
            
            document.getElementById('pitch').textContent = data.pitch;
            document.getElementById('roll').textContent = data.roll;
            
            const bn = document.getElementById('banner');
            const sl = document.getElementById('st-label');
            const ss = document.getElementById('st-sub');
            
            if(data.status === 'BAHAYA'){
              bn.className = 'glass-panel danger';
              sl.style.color = 'var(--red)';
              sl.textContent = 'BAHAYA — MENGANTUK';
              ss.textContent = 'Buzzer Menyala! Segera Berhenti!';
            } else {
              bn.className = 'glass-panel';
              sl.style.color = 'var(--green)';
              sl.textContent = 'NORMAL';
              ss.textContent = 'Pengemudi dalam kondisi baik';
            }
            
            document.getElementById('last-up').textContent = 
              'UPDATE TERAKHIR: ' + new Date().toLocaleTimeString('id-ID');
              
          } catch(e) {
            // Abaikan error parse jika string data belum utuh
          }
        }
      }
    }
  } catch (error) {
    console.error("Error saat membaca Serial:", error);
    document.getElementById('last-up').textContent = 'KONEKSI TERPUTUS';
  } finally {
    reader.releaseLock();
  }
}
</script>
</body>
</html>
